name: Temporary Backend

on:
  workflow_dispatch:   # manual trigger

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared

      - name: Start backend server
        run: |
          # Example: a simple Python HTTP server
          python3 -m http.server 8000 &
          echo "Server PID: $!"

      - name: Create tunnel and keep alive
        run: |
          # cloudflared outputs the public URL in the logs
          ./cloudflared tunnel --url http://localhost:8000 &
          TUNNEL_PID=$!

          # Wait for the tunnel to start and print its URL
          sleep 10
          echo "Tunnel started. Check logs for public URL."

          # Keep the job alive for 10 minutes (600 seconds)
          sleep 600

          # Cleanup (optional, job will kill processes anyway)
          kill $TUNNEL_PID
